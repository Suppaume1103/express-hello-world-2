<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
        .chat {
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .form {
            display: flex;
        }

        .input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .submit {
            padding: 10px;
            border: 1px solid #ccc;
            background: #eee;
            cursor: pointer;
        }
        .nyanSubmit {
            padding: 10px;
            border: 1px solid #ccc;
            background: #c5a53c;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="chat">
        <ul class="messages"></ul>
        <form class="form">
            <input class="input" autocomplete="off" />
            <button class="submit">送る</button>
            <button class="nyanSubmit">語尾をにゃんにして送る&#128573;</button>
        </form>
    </div>
    <script>
        function main() {
            const host = location.origin.replace(/^http/, 'ws')
            const ws = new WebSocket(host + '/ws')
            const myId = self.crypto.randomUUID().substr(0, 8)

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data)
                if (msg.type === 'chat') {
                    const { id, text } = msg
                    const messageList = document.querySelector('.messages')
                    const li = document.createElement('li')
                    if (id === myId) {
                        li.textContent = `(${id})自分:` + text
                    } else {
                        li.textContent = id + ': ' + text
                    }
                    messageList.appendChild(li)
                }
            }

            const form = document.querySelector('.form')

            form.onsubmit = function (e) {
                e.preventDefault()
                const input = document.querySelector('.input')
                const isNyan = e.submitter.classList.contains('nyanSubmit')
                const text = isNyan ? input.value + 'にゃん' : input.value
                ws.send(JSON.stringify({ id: myId, text, type: 'chat' }))
                input.value = ''
                input.focus()
            }

            ws.onerror = function (error) {
                console.error('WebSocket Error: ', error)
            }
        }

        main()
    </script>
</body>

</html>
